<!DOCTYPE html>
<html>
<head>
    <title>Login Test</title>
</head>
<body>
    <h1>Login Test</h1>
    <form id="loginForm">
        <input type="email" id="email" placeholder="Email" value="test@example.com" required><br><br>
        <input type="password" id="password" placeholder="Password" value="test123" required><br><br>
        <button type="submit">Login</button>
    </form>
    <div id="result"></div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            console.log('Testing login with:', { email, password });
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                console.log('Response:', data);
                
                if (response.ok && data.token) {
                    localStorage.setItem('token', data.token);
                    document.getElementById('result').innerHTML = 
                        `<h2 style="color: green;">✅ Login Successful!</h2>
                        <p>Token: ${data.token.substring(0, 50)}...</p>
                        <p>User: ${data.user.name}</p>
                        <p>Redirecting to home...</p>`;
                    
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    document.getElementById('result').innerHTML = 
                        `<h2 style="color: red;">❌ Login Failed</h2>
                        <p>${data.error || 'Unknown error'}</p>`;
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('result').innerHTML = 
                    `<h2 style="color: red;">💥 Network Error</h2>
                    <p>${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
