<!DOCTYPE html>
<html>
<head>
    <title>Login Flow Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #667eea; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #5a6fd8; }
        .result { margin-top: 20px; padding: 15px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .step { margin-bottom: 20px; padding: 10px; background: #f8f9fa; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Complete Login Flow Test</h1>
        
        <div class="step">
            <h3>Step 1: Register User</h3>
            <button onclick="registerUser()">Register Test User</button>
            <div id="registerResult"></div>
        </div>
        
        <div class="step">
            <h3>Step 2: Login User</h3>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="loginEmail" value="searchtest@example.com">
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="loginPassword" value="test123">
            </div>
            <button onclick="loginUser()">Login</button>
            <div id="loginResult"></div>
        </div>
        
        <div class="step">
            <h3>Step 3: Test Authentication</h3>
            <button onclick="testAuth()">Test Protected Resource</button>
            <div id="authResult"></div>
        </div>
        
        <div class="step">
            <h3>Step 4: Test Search API</h3>
            <button onclick="testSearch()">Test Search Location</button>
            <div id="searchResult"></div>
        </div>
    </div>

    <script>
        let authToken = '';
        
        async function registerUser() {
            const resultDiv = document.getElementById('registerResult');
            resultDiv.innerHTML = '⏳ Registering...';
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'searchtest@example.com',
                        password: 'test123',
                        name: 'Search Test'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `<div class="result success">✅ Registration successful: ${data.message}</div>`;
                } else {
                    resultDiv.innerHTML = `<div class="result error">❌ Registration failed: ${data.error}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="result error">💥 Registration error: ${error.message}</div>`;
            }
        }
        
        async function loginUser() {
            const resultDiv = document.getElementById('loginResult');
            resultDiv.innerHTML = '⏳ Logging in...';
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'searchtest@example.com',
                        password: 'test123'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.token) {
                    authToken = data.token;
                    localStorage.setItem('token', authToken);
                    resultDiv.innerHTML = `<div class="result success">✅ Login successful! Token stored.</div>`;
                } else {
                    resultDiv.innerHTML = `<div class="result error">❌ Login failed: ${data.error}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="result error">💥 Login error: ${error.message}</div>`;
            }
        }
        
        async function testAuth() {
            const resultDiv = document.getElementById('authResult');
            const token = localStorage.getItem('token');
            
            if (!token) {
                resultDiv.innerHTML = `<div class="result error">❌ No token found in localStorage</div>`;
                return;
            }
            
            resultDiv.innerHTML = '⏳ Testing authentication...';
            
            try {
                const response = await fetch('/api/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (response.ok && data.user) {
                    resultDiv.innerHTML = `<div class="result success">✅ Authentication verified! User: ${data.user.name}</div>`;
                } else {
                    resultDiv.innerHTML = `<div class="result error">❌ Authentication failed: ${data.error || 'Unknown error'}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="result error">💥 Auth test error: ${error.message}</div>`;
            }
        }
        
        async function testSearch() {
            const resultDiv = document.getElementById('searchResult');
            const token = localStorage.getItem('token');
            
            if (!token) {
                resultDiv.innerHTML = `<div class="result error">❌ No token found - please login first</div>`;
                return;
            }
            
            resultDiv.innerHTML = '⏳ Testing search API...';
            
            try {
                const response = await fetch('/api/places/nearby', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        moodId: 'work',
                        location: { lat: 40.7128, lng: -74.0060 },
                        radius: 2000
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `<div class="result success">✅ Search API working! Found places.</div>`;
                } else {
                    resultDiv.innerHTML = `<div class="result error">❌ Search failed: ${data.error || 'Unknown error'}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="result error">💥 Search error: ${error.message}</div>`;
            }
        }
        
        // Check for existing token on load
        window.onload = function() {
            const existingToken = localStorage.getItem('token');
            if (existingToken) {
                authToken = existingToken;
                document.getElementById('loginResult').innerHTML = `<div class="result success">✅ Token found in localStorage: ${existingToken.substring(0, 30)}...</div>`;
            }
        };
    </script>
</body>
</html>
